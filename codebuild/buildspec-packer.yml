version: 0.2
# buildspec-packer.yml
# Stage 2: Build the Golden AMI using Packer.
# Runs inside CodeBuild. Environment variables injected by the CodeBuild project.
# Outputs the AMI ID to S3 for downstream stages to consume.

env:
  variables:
    PACKER_VERSION: "1.11.0"

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "=== Installing Packer ${PACKER_VERSION} ==="
      - curl -fsSL https://releases.hashicorp.com/packer/${PACKER_VERSION}/packer_${PACKER_VERSION}_linux_amd64.zip -o packer.zip
      - curl -fsSL https://releases.hashicorp.com/packer/${PACKER_VERSION}/packer_${PACKER_VERSION}_SHA256SUMS -o packer_SHA256SUMS
      - sha256sum --ignore-missing -c packer_SHA256SUMS
      - unzip -o packer.zip -d /usr/local/bin/
      - chmod +x /usr/local/bin/packer
      - packer --version

  pre_build:
    commands:
      - 'echo "=== Pre-build: Init Packer plugins ==="'
      - cd "$CODEBUILD_SRC_DIR/packer"
      - packer init golden-ami.pkr.hcl
      - packer fmt -check golden-ami.pkr.hcl
      - |
        packer validate \
          -var "ami_version=${AMI_VERSION}" \
          -var "aws_region=${AWS_REGION}" \
          -var "subnet_id=${SUBNET_ID}" \
          -var "vpc_id=${VPC_ID}" \
          -var "iam_instance_profile=${PACKER_INSTANCE_PROFILE}" \
          -var "java_version=${JAVA_VERSION}" \
          -var "node_version=${NODE_VERSION}" \
          golden-ami.pkr.hcl
      - echo "Packer template validated OK"

  build:
    commands:
      - 'echo "=== Build: Running Packer ==="'
      - cd "$CODEBUILD_SRC_DIR/packer"
      - |
        bash -o pipefail -c '
          PACKER_LOG=1 packer build \
            -var "ami_version=${AMI_VERSION}" \
            -var "aws_region=${AWS_REGION}" \
            -var "subnet_id=${SUBNET_ID}" \
            -var "vpc_id=${VPC_ID}" \
            -var "iam_instance_profile=${PACKER_INSTANCE_PROFILE}" \
            -var "java_version=${JAVA_VERSION}" \
            -var "node_version=${NODE_VERSION}" \
            golden-ami.pkr.hcl 2>&1 | tee /tmp/packer-output.log
        '

  post_build:
    commands:
      - 'echo "=== Post-build: Extracting AMI ID ==="'
      - |
        AMI_ID=$(jq -r '.builds[-1].artifact_id' "$CODEBUILD_SRC_DIR/packer/manifest.json" | cut -d':' -f2)
        if [ -z "$AMI_ID" ] || [ "$AMI_ID" = "null" ]; then
          echo "ERROR: Could not extract AMI ID from Packer manifest"
          cat "$CODEBUILD_SRC_DIR/packer/manifest.json"
          cat /tmp/packer-output.log
          exit 1
        fi
        echo "Built AMI: $AMI_ID"

      # Write AMI ID to a file — passed to downstream stages via S3 artefact
      - echo "$AMI_ID" > "$CODEBUILD_SRC_DIR/ami-id.txt"

      # Tag with pipeline metadata
      - |
        aws ec2 create-tags \
          --region ${AWS_REGION} \
          --resources ${AMI_ID} \
          --tags \
            Key=PipelineExecutionId,Value=${CODEBUILD_BUILD_ID} \
            Key=GitCommit,Value=${CODEBUILD_RESOLVED_SOURCE_VERSION} \
            Key=Status,Value=pending-inspection \
            Key=ProjectName,Value=${PROJECT_NAME} \
            Key=AmiVersion,Value=${AMI_VERSION}

      # Save Packer log and manifest to S3 for auditability
      - |
        aws s3 cp /tmp/packer-output.log \
          s3://${ARTIFACT_BUCKET}/logs/${CODEBUILD_BUILD_ID}/packer-output.log
      - |
        aws s3 cp "$CODEBUILD_SRC_DIR/packer/manifest.json" \
          s3://${ARTIFACT_BUCKET}/logs/${CODEBUILD_BUILD_ID}/manifest.json

      - echo "AMI ID ${AMI_ID} written and tagged. Proceeding to Inspector gate."

artifacts:
  files:
    - ami-id.txt
    - codebuild/buildspec-inspector.yml
    - codebuild/buildspec-promote.yml
  discard-paths: no
  name: BuildOutput
